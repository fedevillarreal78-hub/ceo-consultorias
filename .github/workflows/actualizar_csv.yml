name: Actualizar oportunidades de consultoría

on:
  schedule:
    - cron: '0 14 * * 1'   # Lunes    14:00 UTC = 8:00 AM UTC-6
    - cron: '0 14 * * 4'   # Jueves   14:00 UTC = 8:00 AM UTC-6
  workflow_dispatch:         # Permite ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python buscar_consultorias.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oportunidades_consultoria.csv
          if git diff --cached --exit-code; then
            echo "Sin cambios en el CSV — no se genera commit."
          else
            git commit -m "Auto-update CSV [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
